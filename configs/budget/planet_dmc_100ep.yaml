# @package _global_
# 100-episode-equivalent continuation for PlaNet on DMC Cartpole Swingup.
#
# DMC cartpole_swingup uses max_episode_steps=125 with action repeat 8. This
# budget collects 12,512 control steps, which is 100.096 episode-equivalents.
# Use with training.resume_path=<checkpoint> and resume_mode=warm_start_optimizer.

experiment:
  name: planet_dmc_swingup_100ep

algorithm:
  collect_length: 16
  gamma: 0.99
  free_nats: 3.0
  kl_scale: 1.0
  max_grad_norm: 1000.0
  world_model_lr: 1.0e-3

buffer:
  capacity: 40000
  batch_size: 32
  sequence_length: 25
  sequence_stride: 1
  pad_end_of_episode: false

controllers:
  planner:
    horizon: 12
    num_samples: 256
    top_k: 32
    iterations: 4
    std_init: 0.75
    std_min: 0.05
    use_continuation: true

logging:
  use_tensorboard: true
  log_interval: 1
  log_frequency: 1

training:
  total_timesteps: 20000
  checkpoint_frequency: 2048
  eval_frequency: 4096
  num_eval_episodes: 1
  max_eval_steps: 250
  resume_path: null
  resume_mode: warm_start_optimizer
  phases:
    - name: collect_random_seed
      type: online
      buffer: replay
      duration_steps: 1024
      collect_length: 16
      controller: actor
      workflow_hooks:
        - collect

    - name: train_world_model_seed
      type: offline
      buffer: replay
      duration_updates: 512
      workflow_hooks:
        - update_world_model

    - name: collect_with_planner_1
      type: online
      buffer: replay
      duration_steps: 2048
      collect_length: 16
      controller: planner
      workflow_hooks:
        - collect

    - name: train_world_model_1
      type: offline
      buffer: replay
      duration_updates: 512
      workflow_hooks:
        - update_world_model

    - name: collect_with_planner_2
      type: online
      buffer: replay
      duration_steps: 2048
      collect_length: 16
      controller: planner
      workflow_hooks:
        - collect

    - name: train_world_model_2
      type: offline
      buffer: replay
      duration_updates: 512
      workflow_hooks:
        - update_world_model

    - name: collect_with_planner_3
      type: online
      buffer: replay
      duration_steps: 2048
      collect_length: 16
      controller: planner
      workflow_hooks:
        - collect

    - name: train_world_model_3
      type: offline
      buffer: replay
      duration_updates: 512
      workflow_hooks:
        - update_world_model

    - name: collect_with_planner_4
      type: online
      buffer: replay
      duration_steps: 2048
      collect_length: 16
      controller: planner
      workflow_hooks:
        - collect

    - name: train_world_model_4
      type: offline
      buffer: replay
      duration_updates: 512
      workflow_hooks:
        - update_world_model

    - name: collect_with_planner_5
      type: online
      buffer: replay
      duration_steps: 3296
      collect_length: 16
      controller: planner
      workflow_hooks:
        - collect

    - name: train_world_model_5
      type: offline
      buffer: replay
      duration_updates: 1024
      workflow_hooks:
        - update_world_model

    - name: final_eval
      type: eval_only
      duration_cycles: 1
      workflow_hooks:
        - evaluate
