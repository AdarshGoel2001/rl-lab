# @package _global_
# PlaNet-style DMC Cartpole Swingup run using paper/config-authentic values
# where this state-observation repo can support them.
#
# PlaNet reference values:
# - CEM: horizon 12, samples 1000, top-k 100, iterations 10
# - RSSM: deterministic/model size 200, stochastic state size 30
# - MLP heads: hidden units 300, 3 layers
# - Training batch: 50 sequences x 50 time steps
# - Reward loss scale: 10
#
# This remains state-based, not pixel-based, so it is not a full paper
# reproduction. It is the next compute-realistic paper-aligned experiment.

experiment:
  name: planet_dmc_swingup_paper_authentic

_dims:
  observation: 5
  encoder_output: 5
  action: 1
  stochastic: 30
  deterministic: 200
  representation: 230
  hidden: 200
  head_hidden: 300

algorithm:
  collect_length: 16
  gamma: 0.99
  free_nats: 3.0
  kl_scale: 1.0
  reward_loss_scale: 10.0
  continue_loss_scale: 1.0
  observation_loss_scale: 1.0
  max_grad_norm: 1000.0
  world_model_lr: 1.0e-3

environment:
  _target_: src.environments.dmc_vectorized_wrapper.DMCVectorizedWrapper
  name: cartpole_swingup
  from_pixels: false
  frame_skip: 8
  normalize_obs: false
  normalize_reward: false
  max_episode_steps: 125
  num_envs: 20

buffer:
  capacity: 150000
  batch_size: 50
  sequence_length: 50
  sequence_stride: 1
  pad_end_of_episode: false

components:
  representation_learner:
    feature_dim: ${_dims.encoder_output}
    action_dim: ${_dims.action}
    deterministic_dim: ${_dims.deterministic}
    stochastic_dim: ${_dims.stochastic}
    hidden_dim: ${_dims.hidden}
    min_std: 0.1

  reward_predictor:
    input_dim: ${_dims.representation}
    hidden_dim: ${_dims.head_hidden}
    num_layers: 3

  continue_predictor:
    input_dim: ${_dims.representation}
    hidden_dim: ${_dims.head_hidden}
    num_layers: 3

  observation_predictor:
    input_dim: ${_dims.representation}
    output_dim: ${_dims.observation}
    hidden_dim: ${_dims.head_hidden}
    num_layers: 3

controllers:
  planner:
    representation_dim: ${_dims.representation}
    action_dim: ${_dims.action}
    horizon: 12
    num_samples: 1000
    top_k: 100
    iterations: 10
    std_init: 0.75
    std_min: 0.05
    use_continuation: true

logging:
  use_tensorboard: true
  log_interval: 1
  log_frequency: 1

training:
  total_timesteps: 180000
  checkpoint_frequency: 12800
  eval_frequency: 12800
  # Total eval episodes. Must be divisible by eval environment num_envs.
  num_eval_episodes: 20
  max_eval_steps: 125
  resume_path: null
  # exact is fault tolerance for the same interrupted run.
  # Use warm_start_optimizer for research continuation from a previous checkpoint.
  resume_mode: exact
  phases:
    - name: collect_random_seed
      type: online
      buffer: replay
      duration_steps: 6400
      collect_length: 16
      controller: actor
      workflow_hooks:
        - collect

    - name: train_world_model_seed
      type: offline
      buffer: replay
      duration_updates: 2500
      workflow_hooks:
        - update_world_model

    - name: collect_with_planner_1
      type: online
      buffer: replay
      duration_steps: 6400
      collect_length: 16
      controller: planner
      workflow_hooks:
        - collect

    - name: train_world_model_1
      type: offline
      buffer: replay
      duration_updates: 2500
      workflow_hooks:
        - update_world_model

