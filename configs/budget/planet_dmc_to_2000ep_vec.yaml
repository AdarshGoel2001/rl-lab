# @package _global_
# Continue PlaNet DMC Cartpole Swingup to approximately 2000 episode-equivalents.
# This variant preserves the same total control-step data budget as
# planet_dmc_to_2000ep, but collects with four parallel DMC environments.

experiment:
  name: planet_dmc_swingup_to_2000ep_vec

algorithm:
  collect_length: 16
  gamma: 0.99
  free_nats: 3.0
  kl_scale: 1.0
  max_grad_norm: 1000.0
  world_model_lr: 1.0e-3

environment:
  _target_: src.environments.dmc_vectorized_wrapper.DMCVectorizedWrapper
  name: cartpole_swingup
  from_pixels: false
  frame_skip: 8
  normalize_obs: false
  normalize_reward: false
  max_episode_steps: 125
  num_envs: 4

buffer:
  capacity: 260000
  batch_size: 32
  sequence_length: 25
  sequence_stride: 1
  pad_end_of_episode: false

controllers:
  planner:
    horizon: 12
    num_samples: 256
    top_k: 32
    iterations: 4
    std_init: 0.75
    std_min: 0.05
    use_continuation: true

logging:
  use_tensorboard: true
  log_interval: 1
  log_frequency: 1

training:
  total_timesteps: 320000
  checkpoint_frequency: 16384
  eval_frequency: 32768
  # Total eval episodes. Must be divisible by eval environment num_envs.
  num_eval_episodes: 4
  max_eval_steps: 250
  resume_path: null
  resume_mode: warm_start_optimizer
  phases:
    - name: collect_with_planner_1
      type: online
      buffer: replay
      duration_steps: 23424
      collect_length: 16
      controller: planner
      workflow_hooks:
        - collect

    - name: train_world_model_1
      type: offline
      buffer: replay
      duration_updates: 6656
      workflow_hooks:
        - update_world_model

    - name: collect_with_planner_2
      type: online
      buffer: replay
      duration_steps: 23424
      collect_length: 16
      controller: planner
      workflow_hooks:
        - collect

    - name: train_world_model_2
      type: offline
      buffer: replay
      duration_updates: 6656
      workflow_hooks:
        - update_world_model

    - name: collect_with_planner_3
      type: online
      buffer: replay
      duration_steps: 23424
      collect_length: 16
      controller: planner
      workflow_hooks:
        - collect

    - name: train_world_model_3
      type: offline
      buffer: replay
      duration_updates: 6656
      workflow_hooks:
        - update_world_model

    - name: collect_with_planner_4
      type: online
      buffer: replay
      duration_steps: 23424
      collect_length: 16
      controller: planner
      workflow_hooks:
        - collect

    - name: train_world_model_4
      type: offline
      buffer: replay
      duration_updates: 6656
      workflow_hooks:
        - update_world_model

    - name: collect_with_planner_5
      type: online
      buffer: replay
      duration_steps: 23424
      collect_length: 16
      controller: planner
      workflow_hooks:
        - collect

    - name: train_world_model_5
      type: offline
      buffer: replay
      duration_updates: 6656
      workflow_hooks:
        - update_world_model

    - name: collect_with_planner_6
      type: online
      buffer: replay
      duration_steps: 23424
      collect_length: 16
      controller: planner
      workflow_hooks:
        - collect

    - name: train_world_model_6
      type: offline
      buffer: replay
      duration_updates: 6656
      workflow_hooks:
