# @package _global_
# Tiny smoke-test budget for og_wm_carracing.

experiment:
  name: og_wm_carracing_tiny

algorithm:
  collect_length: 8

environment:
  num_envs: 2
  parallel_backend: sync

buffer:
  sequence_length: 4
  sequence_stride: 1
  batch_size: 4
  buffer_flush_size: 16

logging:
  log_interval: 1

training:
  total_timesteps: 100
  checkpoint_frequency: 0
  eval_frequency: 0
  phases:
    - name: data_collection
      type: online
      buffer: replay
      duration_steps: 16
      workflow_hooks:
        - collect
    - name: converge_vae
      type: online
      buffer: replay
      duration_updates: 2
      workflow_hooks:
        - update_world_model
    - name: converge_mdn
      type: online
      buffer: replay
      duration_updates: 1
      workflow_hooks:
        - update_world_model
