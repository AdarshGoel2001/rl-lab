# @package _global_
# Mac-safe CartPole solve attempt for PlaNet-style RSSM + CEM planning.

experiment:
  name: planet_cartpole_solve

_dims:
  stochastic: 16
  deterministic: 64
  representation: 80
  hidden: 128

algorithm:
  collect_length: 64
  gamma: 0.99
  free_nats: 0.0
  kl_scale: 0.1
  max_grad_norm: 100.0
  world_model_lr: 1.0e-3

environment:
  num_envs: 4
  vectorization: sync

buffer:
  capacity: 50000
  batch_size: 64
  sequence_length: 16
  sequence_stride: 1

components:
  representation_learner:
    deterministic_dim: ${_dims.deterministic}
    stochastic_dim: ${_dims.stochastic}
    hidden_dim: ${_dims.hidden}
    min_std: 0.1

  reward_predictor:
    input_dim: ${_dims.representation}
    hidden_dim: 64

  continue_predictor:
    input_dim: ${_dims.representation}
    hidden_dim: 64

controllers:
  planner:
    representation_dim: ${_dims.representation}
    action_dim: ${_dims.action}
    horizon: 12
    num_samples: 64
    top_k: 8
    iterations: 2
    std_init: 0.75
    std_min: 0.05

logging:
  use_tensorboard: true
  log_interval: 1
  log_frequency: 1

training:
  total_timesteps: 100000
  checkpoint_frequency: 0
  eval_frequency: 0
  # Total eval episodes. Must be divisible by eval environment num_envs.
  num_eval_episodes: 4
  max_eval_steps: 500
  resume_path: null
  phases:
    - name: warmup_collection
      type: online
      buffer: replay
      duration_steps: 4096
      workflow_hooks:
        - collect

    - name: train_world_model_1
      type: offline
      buffer: replay
      duration_updates: 500
      workflow_hooks:
        - update_world_model

    - name: collect_planet_1
      type: online
      buffer: replay
      controller: planner
      duration_cycles: 20
      workflow_hooks:
        - collect
        - update_world_model

    - name: train_world_model_2
      type: offline
      buffer: replay
      duration_updates: 500
      workflow_hooks:
        - update_world_model

    - name: collect_planet_2
      type: online
      buffer: replay
      controller: planner
      duration_cycles: 20
      workflow_hooks:
        - collect
        - update_world_model

    - name: final_eval
      type: eval_only
      duration_cycles: 1
      workflow_hooks:
        - evaluate
