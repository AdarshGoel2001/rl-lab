# @package _global_
# Continue PlaNet DMC Cartpole Swingup to approximately 2000 episode-equivalents.
#
# Starting point assumed for accounting:
# - initial + short continuation + 100ep run: ~126.716 episode-equivalents
# - this budget collects 234,160 control steps = 1,873.28 episode-equivalents
# - total after this run: ~1,999.996 episode-equivalents
#
# Use with training.resume_path=<latest checkpoint> and resume_mode=warm_start_optimizer.

experiment:
  name: planet_dmc_swingup_to_2000ep

algorithm:
  collect_length: 16
  gamma: 0.99
  free_nats: 3.0
  kl_scale: 1.0
  max_grad_norm: 1000.0
  world_model_lr: 1.0e-3

buffer:
  capacity: 260000
  batch_size: 32
  sequence_length: 25
  sequence_stride: 1
  pad_end_of_episode: false

controllers:
  planner:
    horizon: 12
    num_samples: 256
    top_k: 32
    iterations: 4
    std_init: 0.75
    std_min: 0.05
    use_continuation: true

logging:
  use_tensorboard: true
  log_interval: 1
  log_frequency: 1

training:
  total_timesteps: 320000
  checkpoint_frequency: 16384
  eval_frequency: 32768
  num_eval_episodes: 1
  max_eval_steps: 250
  resume_path: null
  resume_mode: warm_start_optimizer
  phases:
    - name: collect_with_planner_1
      type: online
      buffer: replay
      duration_steps: 23424
      collect_length: 16
      controller: planner
      workflow_hooks:
        - collect

    - name: train_world_model_1
      type: offline
      buffer: replay
      duration_updates: 6656
      workflow_hooks:
        - update_world_model

    - name: collect_with_planner_2
      type: online
      buffer: replay
      duration_steps: 23424
      collect_length: 16
      controller: planner
      workflow_hooks:
        - collect

    - name: train_world_model_2
      type: offline
      buffer: replay
      duration_updates: 6656
      workflow_hooks:
        - update_world_model

    - name: collect_with_planner_3
      type: online
      buffer: replay
      duration_steps: 23424
      collect_length: 16
      controller: planner
      workflow_hooks:
        - collect

    - name: train_world_model_3
      type: offline
      buffer: replay
      duration_updates: 6656
      workflow_hooks:
        - update_world_model

    - name: collect_with_planner_4
      type: online
      buffer: replay
      duration_steps: 23424
